<div class="product-item">
  <div class="product-image-container">
    <img src="{{urlImagen}}" alt="{{nombre}} {{color}}">
    {{discountBadge}}
  </div>
  <div class="product-info floating-info {{alignClass}}">
    <div class="info-text {{textAlignClass}}">
      <span class="cursive-name">{{nombre}}</span><br>
      <span class="product-model">{{color}}</span><br>
      <span class="product-price">S/ {{precio}}</span>
    </div>
    {{pointerArrow}}
  </div>
</div>
