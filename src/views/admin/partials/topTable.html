<div class="admin-table-wrapper">
  <table class="admin-table">
    <colgroup>
      <col style="width: 100px;"> <!-- Imagen -->
      <col>                      <!-- Nombre (Ocupa el resto) -->
      <col style="width: 80px;">  <!-- Color -->
      <col style="width: 90px;">  <!-- Precio -->
      <col style="width: 80px;">  <!-- Descuento -->
      <col style="width: 100px;"> <!-- Género -->
      <col style="width: 80px;">  <!-- Estado -->
      <col style="width: 130px;"> <!-- Acciones -->
    </colgroup>
    <thead>
      <tr>
        <th>Imagen</th>
        <th>Nombre</th>
        <th>Color</th>
        <th>Precio</th>
        <th>Descuento</th>
        <th>Género</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="top-table-body">
      <!-- Injected dynamically via JS -->
    </tbody>
  </table>
</div>
